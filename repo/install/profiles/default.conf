#!/usr/bin/env bash

# ==============================================================================
#  Arch Secure Installer — profiles/default.conf
#  Willem's personal defaults
# ==============================================================================

# ------------------------------------------------------------------------------
# Identity
# ------------------------------------------------------------------------------

INSTALL_HOSTNAME="wa-arch"
USERNAME="willem"
USER_SHELL="/bin/bash"
TIMEZONE="Europe/Amsterdam"
USER_GROUPS="wheel"

# ------------------------------------------------------------------------------
# Disk
# ------------------------------------------------------------------------------

TARGET_DISK="/dev/nvme0n1"
DISK_WIPE_MODE="quick"
ROOT_FS="ext4"
EFI_SIZE="512MiB"

# ------------------------------------------------------------------------------
# Secure Boot
# ------------------------------------------------------------------------------

SB_MODE="custom"

# ------------------------------------------------------------------------------
# Mirrors & Pacman
# ------------------------------------------------------------------------------

MIRROR_COUNTRIES="Netherlands,Germany"
PACMAN_PARALLEL_CHROOT=20

# ------------------------------------------------------------------------------
# Desktop
# ------------------------------------------------------------------------------

DESKTOP_ENV="hyprland"

# ------------------------------------------------------------------------------
# Extra Packages (single space-separated line)
# ------------------------------------------------------------------------------

EXTRA_PACKAGES="usbguard power-profiles-daemon bluez bluez-utils pipewire pipewire-alsa pipewire-pulse pipewire-jack wireplumber mesa vulkan-radeon libva-mesa-driver lib32-mesa lib32-vulkan-radeon lib32-libva-mesa-driver xdg-user-dirs xdg-utils btop fastfetch keepassxc alacritty neovim zsh-completions zsh-autosuggestions ttf-dejavu ttf-liberation noto-fonts noto-fonts-cjk noto-fonts-emoji hunspell hunspell-en_us hunspell-nl qemu-full libvirt virt-manager"

# ------------------------------------------------------------------------------
# Export Everything
# ------------------------------------------------------------------------------

export INSTALL_HOSTNAME
export USERNAME
export USER_SHELL
export TIMEZONE
export USER_GROUPS
export TARGET_DISK
export DISK_WIPE_MODE
export ROOT_FS
export EFI_SIZE
export SB_MODE
export MIRROR_COUNTRIES
export PACMAN_PARALLEL_CHROOT
export DESKTOP_ENV
export EXTRA_PACKAGES
