#!/usr/sbin/nft -f
flush ruleset

define trusted_ifaces = { "lo", "virbr0", "wlan0" }

table inet filter {
  chain input {
    type filter hook input priority filter;
    policy drop;

    # Drop invalid packets
    ct state invalid drop

    # Allow established connections
    ct state { established, related } accept

    # Loopback
    iifname "lo" accept

    # Bogon protection
    ip saddr {
      0.0.0.0/8,
      100.64.0.0/10,
      169.254.0.0/16,
      192.0.2.0/24,
      198.18.0.0/15,
      224.0.0.0/4,
      240.0.0.0/4
    } iifname != $trusted_ifaces drop

    # TCP scan protection
    tcp flags & (fin|syn|rst|psh|ack|urg) == 0 drop
    tcp flags & (fin|syn) == (fin|syn) drop

    # ICMP (rate limited)
    ip protocol icmp limit rate 10/second accept
    meta l4proto ipv6-icmp limit rate 10/second accept

    # DHCP
    udp dport { 67, 68 } accept
    udp dport { 546, 547 } accept

    # mDNS
    ip daddr 224.0.0.251 udp dport 5353 accept
    ip6 daddr ff02::fb udp dport 5353 accept
  }

  chain forward {
    type filter hook forward priority filter;
    policy drop;

    # Allow return traffic
    ct state { established, related } accept

    # Prevent VM → host attacks (ARP spoofing, direct host access)
    iifname "virbr0" ip daddr 192.168.122.1 drop

    # VM → internet
    iifname "virbr0" oifname "wlan0" accept

    # Internet → VM (only established)
    iifname "wlan0" oifname "virbr0" ct state established,related accept
  }

  chain output {
    type filter hook output priority filter;
    policy accept;
  }
}

table ip nat {
  chain postrouting {
    type nat hook postrouting priority srcnat;

    # NAT for libvirt VMs
    oifname "wlan0" masquerade
  }
}
